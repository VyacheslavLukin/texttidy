name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write # push the dynamic coverage badge to the `badges` branch (main only)

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check (Biome)
        run: npm run lint

      - name: Unit tests + 100% coverage gate
        run: npm test

      - name: Build static site
        run: npm run build

      # Publish the coverage % to the `badges` branch for the README's dynamic badge.
      # Main pushes only; non-fatal so a badge hiccup never fails CI.
      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update-coverage-badge.sh
